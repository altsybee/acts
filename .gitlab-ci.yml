stages:
  - build
  - test

variables:
  LCG: "LCG_108/x86_64-el9-gcc14-opt"

default:
  # Use CERN-supported container with LCG/CVMFS access
  image: gitlab-registry.cern.ch/acts/acts-athena-ci/alma9-atlasos-dev:v2
  before_script:
    - echo "Container ready, build tools available"

# -----------------------
# 🔧 BUILD ACTS
# -----------------------
build_acts:
  stage: build
  script:
    - echo "::group::Setup LCG"
    - ls /
    - source /cvmfs/sft.cern.ch/lcg/views/${LCG}/setup.sh

    - echo "::group::Checkout ACTS"
    - git clone https://github.com/acts-project/acts.git

    - echo "::group::Configure ACTS"
    - cmake -S acts -B acts/build \
        -DACTS_BUILD_PLUGIN_GEANT4=on \
        -DACTS_BUILD_PLUGIN_JSON=on \
        -DACTS_BUILD_PLUGIN_ROOT=on \
        -DACTS_BUILD_EXAMPLES_ROOT=on \
        -DACTS_BUILD_FATRAS=on \
        -DACTS_BUILD_FATRAS_GEANT4=on \
        -DACTS_BUILD_EXAMPLES_GEANT4=on \
        -DACTS_BUILD_PYTHON_BINDINGS=on \
        -DACTS_BUILD_ANALYSIS_APPS=on \
        -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
        -DACTS_BUILD_EXAMPLES_PYTHIA8=on \
        -DCMAKE_INSTALL_PREFIX=acts/install

    - echo "::group::Build ACTS"
    - cmake --build acts/build -- -j$(nproc) install

  artifacts:
    paths:
      - acts/install
    expire_in: 1 day

# -----------------------
# 🧪 TEST TEMPLATE
# -----------------------
.test_template:
  stage: test
  needs:
    - job: build_acts
      artifacts: true
  script:
    - echo "::group::Setup LCG"
    - source /cvmfs/sft.cern.ch/lcg/views/${LCG}/setup.sh

    - echo "::group::Setup ACTS"
    - source acts/install/bin/this_acts.sh
    - export ACTS_SEQUENCER_DISABLE_FPEMON=1

    - echo "::group::Build project"
    - source setup.sh
    - mkdir -p build && cd build
    - cmake -DCMAKE_PREFIX_PATH=${PWD}/../acts/install ..
    - make -j2
    - cd ..

# -----------------------
# 🧪 TEST JOBS
# -----------------------
test_alice3:
  extends: .test_template
  script:
    - echo "::group::Running Alice3 full chain test"
    - python alice3_full_chain.py

#test_example:
#  extends: .test_template
#  script:
#    - echo "::group::Running another example test"
#    - python another_test.py

# -----------------------
# 🎯 PIPELINE RULES
# -----------------------
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"